<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selfie Snap!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --screen-bg: #0f3460;
    --accent: #e94560;
    --flash: #fff;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    font-family: 'Boogaloo', cursive;
    color: #fff;
    font-size: 2.2rem;
    letter-spacing: 2px;
    margin-bottom: 18px;
    text-shadow: 2px 2px 0 var(--accent);
  }

  .phone {
    position: relative;
    width: 320px;
    background: #111;
    border-radius: 40px;
    padding: 18px 12px 28px;
    box-shadow: 0 0 0 4px #333, 0 20px 60px rgba(0,0,0,0.7);
  }

  .notch {
    width: 90px;
    height: 18px;
    background: #111;
    border-radius: 0 0 14px 14px;
    margin: 0 auto 10px;
    position: relative;
    z-index: 2;
  }

  .screen {
    position: relative;
    width: 100%;
    height: 420px;
    background: var(--screen-bg);
    border-radius: 20px;
    overflow: hidden;
  }

  /* Real camera video feed */
  #cameraVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 20px;
    transform: scaleX(-1);
    display: none;
    z-index: 1;
  }

  /* Animated fake camera feed (fallback) */
  .camera-feed {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
  }

  /* Subtle scanline overlay */
  .camera-feed::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
  }

  /* Live person silhouette placeholder */
  .live-person {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 320px;
  }

  /* Camera permission banner */
  #camBanner {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.85);
    font-size: 0.7rem;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  /* Grid overlay */
  .grid-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.2;
    background-image:
      linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px);
    background-size: 33.33% 33.33%;
  }

  /* Corner brackets */
  .brackets {
    position: absolute;
    inset: 14px;
    pointer-events: none;
  }
  .bracket {
    position: absolute;
    width: 22px;
    height: 22px;
    border-color: rgba(255,255,255,0.7);
    border-style: solid;
  }
  .bracket.tl { top: 0; left: 0; border-width: 3px 0 0 3px; }
  .bracket.tr { top: 0; right: 0; border-width: 3px 3px 0 0; }
  .bracket.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
  .bracket.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

  /* Flash overlay */
  .flash-overlay {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    border-radius: 20px;
    transition: opacity 0.05s;
    z-index: 10;
  }
  .flash-overlay.flash {
    animation: doFlash 0.4s ease-out forwards;
  }
  @keyframes doFlash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Captured photo popup */
  .photo-popup {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    border-radius: 20px;
    transition: opacity 0.2s;
  }
  .photo-popup.show {
    opacity: 1;
    pointer-events: all;
  }

  .photo-frame {
    background: white;
    padding: 8px 8px 32px;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    transform: rotate(-2deg);
    animation: popIn 0.3s cubic-bezier(0.17,0.67,0.35,1.2) forwards;
    cursor: pointer;
  }
  @keyframes popIn {
    0% { transform: scale(0.5) rotate(-2deg); }
    100% { transform: scale(1) rotate(-2deg); }
  }

  canvas.selfie-canvas {
    display: block;
    width: 220px;
    height: 220px;
    image-rendering: pixelated;
  }

  .photo-caption {
    text-align: center;
    font-family: 'Boogaloo', cursive;
    font-size: 1rem;
    color: #333;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .tap-hint {
    position: absolute;
    bottom: 6px;
    width: 100%;
    text-align: center;
    font-size: 0.7rem;
    color: rgba(0,0,0,0.4);
  }

  /* Bottom controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 20px;
    gap: 0;
  }

  .shutter-ring {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 4px solid #555;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }

  .shutter-btn {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(233,69,96,0.3), 0 4px 16px rgba(233,69,96,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
  }
  .shutter-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 0 0 6px rgba(233,69,96,0.3), 0 4px 20px rgba(233,69,96,0.6);
  }
  .shutter-btn:active {
    transform: scale(0.94);
  }

  .counter {
    position: absolute;
    bottom: 6px;
    right: 18px;
    font-family: 'Boogaloo', cursive;
    color: rgba(255,255,255,0.6);
    font-size: 0.85rem;
    letter-spacing: 1px;
  }

  .gallery-strip {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    height: 52px;
    align-items: center;
    justify-content: center;
  }

  .thumb {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    border: 2px solid #333;
    overflow: hidden;
    flex-shrink: 0;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }
  .thumb:hover {
    border-color: var(--accent);
    transform: scale(1.1);
  }
  .thumb canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .hint-text {
    color: rgba(255,255,255,0.35);
    font-size: 0.75rem;
    margin-top: 10px;
    letter-spacing: 1px;
    text-align: center;
  }
</style>
</head>
<body>

<h1>📸 Snap Selfie!</h1>

<div class="phone">
  <div class="notch"></div>
  <div class="screen" id="screen">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <div class="camera-feed" id="fallbackFeed">
      <svg class="live-person" viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg" id="livePerson">
        <!-- Dynamic live person - updated by JS -->
      </svg>
    </div>
    <div id="camBanner">📷 Requesting camera…</div>
    <div class="grid-overlay"></div>
    <div class="brackets">
      <div class="bracket tl"></div>
      <div class="bracket tr"></div>
      <div class="bracket bl"></div>
      <div class="bracket br"></div>
    </div>
    <div class="flash-overlay" id="flashOverlay"></div>
    <div class="photo-popup" id="photoPopup">
      <div class="photo-frame" id="photoFrame" onclick="closePhoto()">
        <canvas class="selfie-canvas" id="selfieCanvas" width="220" height="220"></canvas>
        <div class="photo-caption" id="photoCaption">✨ Fabulous! ✨</div>
        <div class="tap-hint">tap to close</div>
      </div>
    </div>
    <div class="counter" id="counter">0 snaps</div>
  </div>

  <div class="controls">
    <div class="shutter-ring">
      <button class="shutter-btn" id="shutterBtn" onclick="takeSelfie()"></button>
    </div>
  </div>
</div>

<div class="gallery-strip" id="galleryStrip"></div>
<div class="hint-text">press the red button · tap photo to close</div>

<script>
let snapCount = 0;
const captions = [
  "✨ Gorgeous! ✨", "💅 Slay Queen!", "🌟 Star Power!", "🎉 Camera Ready!",
  "😎 Too Cool!", "🦄 Iconic!", "🔥 On Fire!", "💖 Main Character!",
  "🎭 Artsy Vibes!", "👾 Glitch Mode!", "🍕 Pizza Face!", "🤖 Robot Glam!"
];

// Palette pools
const skinTones = ['#FFDBB5','#F4A460','#D2691E','#8B4513','#FFE0BD','#FFCD94','#EAC086','#C68642'];
const hairColors = ['#1a1a1a','#8B0000','#4169E1','#FF6347','#32CD32','#FF1493','#FFD700','#9400D3','#00CED1'];
const bgColors = [
  ['#FF6B6B','#FFA07A'],['#4ECDC4','#45B7D1'],['#A8E6CF','#DCEDC1'],
  ['#FFD93D','#FF6B6B'],['#C3A6FF','#F8BFCF'],['#84FAB0','#8FD3F4'],
  ['#F093FB','#F5576C'],['#4FACFE','#00F2FE']
];
const accessoryTypes = ['glasses','hat','bow','none','none','none'];
const expressionTypes = ['happy','excited','cool','surprised','smirk','silly'];

function rnd(min, max) { return Math.random() * (max - min) + min; }
function rndInt(min, max) { return Math.floor(rnd(min, max+1)); }
function pick(arr) { return arr[rndInt(0, arr.length-1)]; }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function lighten(hex, amt=40) {
  const {r,g,b} = hexToRgb(hex);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darken(hex, amt=40) {
  const {r,g,b} = hexToRgb(hex);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

function drawCartoonSelfie(ctx, w, h) {
  const skin = pick(skinTones);
  const hair = pick(hairColors);
  const [bg1, bg2] = pick(bgColors);
  const accessory = pick(accessoryTypes);
  const expression = pick(expressionTypes);
  const eyeColor = pick(['#4169E1','#228B22','#8B4513','#4B0082','#FF4500']);

  // Background gradient
  const grad = ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0, bg1);
  grad.addColorStop(1, bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,w,h);

  // BG geometric shapes
  ctx.globalAlpha = 0.2;
  for(let i=0;i<6;i++) {
    ctx.fillStyle = i%2===0 ? '#fff' : bg2;
    ctx.beginPath();
    const cx=rnd(0,w), cy=rnd(0,h), size=rnd(20,80);
    if(i%3===0) { ctx.arc(cx,cy,size,0,Math.PI*2); }
    else if(i%3===1) { ctx.rect(cx-size/2,cy-size/2,size,size); }
    else { ctx.moveTo(cx,cy-size); ctx.lineTo(cx+size,cy+size); ctx.lineTo(cx-size,cy+size); ctx.closePath(); }
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  const cx = w/2, cy = h/2;

  // Neck
  ctx.fillStyle = skin;
  ctx.fillRect(cx-18, cy+70, 36, 50);

  // Shoulders (trapezoid)
  ctx.fillStyle = pick(['#E74C3C','#3498DB','#2ECC71','#9B59B6','#F39C12','#1ABC9C','#E67E22']);
  ctx.beginPath();
  ctx.moveTo(cx-80, h+20);
  ctx.lineTo(cx+80, h+20);
  ctx.lineTo(cx+50, cy+90);
  ctx.lineTo(cx-50, cy+90);
  ctx.closePath();
  ctx.fill();

  // Head (slightly rectangular with rounded corners)
  const headW = 90 + rndInt(-10,10);
  const headH = 100 + rndInt(-10,10);
  ctx.fillStyle = skin;
  roundRect(ctx, cx - headW/2, cy - headH/2 - 10, headW, headH, 28);
  ctx.fill();

  // Ears
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.ellipse(cx - headW/2 - 4, cy + 2, 10, 14, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + headW/2 + 4, cy + 2, 10, 14, 0, 0, Math.PI*2);
  ctx.fill();

  // Hair
  drawHair(ctx, cx, cy, headW, headH, hair, expression);

  // Eyebrows
  const brow = darken(skin, 60);
  drawEyebrows(ctx, cx, cy, headW, expression, brow);

  // Eyes
  drawEyes(ctx, cx, cy, headW, expression, eyeColor);

  // Nose (geometric triangle/circle)
  ctx.fillStyle = darken(skin, 25);
  if(Math.random()>0.5) {
    ctx.beginPath();
    ctx.moveTo(cx, cy+10);
    ctx.lineTo(cx-8, cy+28);
    ctx.lineTo(cx+8, cy+28);
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.arc(cx, cy+20, 7, 0, Math.PI*2);
    ctx.fill();
  }

  // Mouth
  drawMouth(ctx, cx, cy, expression);

  // Cheeks (blush)
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#FF6B8A';
  ctx.beginPath(); ctx.ellipse(cx-32, cy+28, 14, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+32, cy+28, 14, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // Accessory
  if(accessory==='glasses') drawGlasses(ctx, cx, cy, headW);
  else if(accessory==='hat') drawHat(ctx, cx, cy, headW, headH, hair);
  else if(accessory==='bow') drawBow(ctx, cx, cy, headW, headH, hair);

  // Flash sparkle corner
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for(let i=0;i<5;i++) {
    const sx=rnd(w*0.7,w-10), sy=rnd(5,h*0.3);
    const ss=rnd(2,6);
    ctx.beginPath(); ctx.arc(sx,sy,ss,0,Math.PI*2); ctx.fill();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawHair(ctx, cx, cy, hw, hh, hair, expression) {
  ctx.fillStyle = hair;
  const hairStyle = rndInt(0,4);
  const top = cy - hh/2 - 10;

  if(hairStyle===0) {
    // Short flat top
    ctx.fillRect(cx - hw/2 - 5, top - 20, hw + 10, 28);
  } else if(hairStyle===1) {
    // Spiky
    ctx.beginPath();
    const spikes=5+rndInt(0,3);
    for(let i=0;i<spikes;i++) {
      const bx = (cx-hw/2) + (hw/(spikes-1))*i;
      ctx.lineTo(bx, top);
      ctx.lineTo(bx + hw/(spikes*2), top - 24 - rnd(0,18));
    }
    ctx.lineTo(cx+hw/2, top);
    ctx.closePath();
    ctx.fill();
  } else if(hairStyle===2) {
    // Long sides
    ctx.beginPath();
    ctx.ellipse(cx, top - 5, hw/2 + 8, 25, 0, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(cx - hw/2 - 6, top, 16, hh + 20);
    ctx.fillRect(cx + hw/2 - 10, top, 16, hh + 20);
  } else {
    // Curly cloud
    for(let i=0;i<7;i++) {
      ctx.beginPath();
      ctx.arc(cx - hw/2 + (i*hw/6), top - rnd(0,12), 18+rnd(0,8), 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawEyebrows(ctx, cx, cy, hw, expression, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  const ey = cy - 18;
  const ex = cx - 20;

  if(expression==='surprised') {
    ctx.beginPath(); ctx.moveTo(ex-12, ey-10); ctx.quadraticCurveTo(ex,ey-18,ex+12,ey-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+8, ey-10); ctx.quadraticCurveTo(cx+20,ey-18,cx+32,ey-10); ctx.stroke();
  } else if(expression==='cool') {
    ctx.beginPath(); ctx.moveTo(ex-12, ey); ctx.lineTo(ex+12, ey); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+8, ey); ctx.lineTo(cx+32, ey); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(ex-12, ey); ctx.quadraticCurveTo(ex,ey-8,ex+12,ey); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+8, ey); ctx.quadraticCurveTo(cx+20,ey-8,cx+32,ey); ctx.stroke();
  }
}

function drawEyes(ctx, cx, cy, hw, expression, eyeColor) {
  const ey = cy - 5;
  const positions = [cx - 22, cx + 22];

  for(let ex of positions) {
    if(expression==='cool') {
      // Sunglasses lens shape
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.rect(ex-14, ey-10, 28, 18);
      ctx.fill();
      ctx.strokeStyle='#888'; ctx.lineWidth=2;
      ctx.strokeRect(ex-14, ey-10, 28, 18);
    } else {
      // White
      ctx.fillStyle='white';
      ctx.beginPath(); ctx.ellipse(ex, ey, 14, 14, 0, 0, Math.PI*2); ctx.fill();
      // Iris
      ctx.fillStyle = eyeColor;
      ctx.beginPath(); ctx.ellipse(ex, ey, 9, 9, 0, 0, Math.PI*2); ctx.fill();
      // Pupil
      ctx.fillStyle='#111';
      ctx.beginPath(); ctx.ellipse(ex+1, ey+1, 5, 5, 0, 0, Math.PI*2); ctx.fill();
      // Shine
      ctx.fillStyle='white';
      ctx.beginPath(); ctx.ellipse(ex+4, ey-4, 3, 3, 0, 0, Math.PI*2); ctx.fill();
      // Lashes (top)
      if(Math.random()>0.5) {
        ctx.strokeStyle='#111'; ctx.lineWidth=2;
        for(let l=-2;l<=2;l++) {
          ctx.beginPath();
          ctx.moveTo(ex+l*4.5, ey-13);
          ctx.lineTo(ex+l*5, ey-19);
          ctx.stroke();
        }
      }
    }
  }

  if(expression==='cool') {
    // bridge
    ctx.strokeStyle='#888'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx-8, ey-1); ctx.lineTo(cx+8, ey-1); ctx.stroke();
  }
}

function drawMouth(ctx, cx, cy, expression) {
  const my = cy + 38;
  ctx.strokeStyle='#c0392b'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.fillStyle='#c0392b';

  if(expression==='happy' || expression==='excited') {
    ctx.beginPath();
    ctx.moveTo(cx-20, my);
    ctx.quadraticCurveTo(cx, my+18, cx+20, my);
    if(expression==='excited') {
      ctx.quadraticCurveTo(cx, my+28, cx-20, my);
      ctx.fill();
      // teeth
      ctx.fillStyle='white';
      ctx.beginPath();
      ctx.moveTo(cx-16, my+2);
      ctx.quadraticCurveTo(cx, my+14, cx+16, my+2);
      ctx.lineTo(cx+16, my+8);
      ctx.quadraticCurveTo(cx, my+18, cx-16, my+8);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.stroke();
    }
  } else if(expression==='surprised') {
    ctx.fillStyle='#333';
    ctx.beginPath();
    ctx.ellipse(cx, my+5, 14, 16, 0, 0, Math.PI*2);
    ctx.fill();
  } else if(expression==='smirk') {
    ctx.beginPath();
    ctx.moveTo(cx-14, my+2);
    ctx.quadraticCurveTo(cx+4, my+14, cx+20, my-4);
    ctx.stroke();
  } else if(expression==='silly') {
    // tongue out
    ctx.fillStyle='#FF6B8A';
    ctx.beginPath();
    ctx.arc(cx, my+12, 14, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle='#E75480';
    ctx.beginPath();
    ctx.arc(cx, my+18, 10, 0, Math.PI);
    ctx.fill();
    ctx.strokeStyle='#c0392b';
    ctx.beginPath();
    ctx.moveTo(cx-14, my+1); ctx.lineTo(cx+14, my+1);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(cx-16, my);
    ctx.lineTo(cx+16, my);
    ctx.stroke();
  }
}

function drawGlasses(ctx, cx, cy, hw) {
  const ey = cy - 5;
  const color = pick(['#ff0','#f0f','#0ff','#f60','#fff']);
  ctx.strokeStyle = color; ctx.lineWidth = 3;
  const lenses = [cx-22, cx+22];
  for(let lx of lenses) {
    ctx.beginPath();
    ctx.rect(lx-14, ey-12, 28, 22);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(cx-8, ey-1); ctx.lineTo(cx+8, ey-1); ctx.stroke();
  // temples
  ctx.beginPath(); ctx.moveTo(cx-36, ey-1); ctx.lineTo(cx-hw/2-8, ey); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+36, ey-1); ctx.lineTo(cx+hw/2+8, ey); ctx.stroke();
}

function drawHat(ctx, cx, cy, hw, hh, hair) {
  const top = cy - hh/2 - 10;
  const hatColor = pick(['#333','#E74C3C','#2C3E50','#8B0000','#00008B','#006400']);
  ctx.fillStyle = hatColor;
  // brim
  ctx.beginPath();
  ctx.ellipse(cx, top+2, hw/2+20, 10, 0, 0, Math.PI*2);
  ctx.fill();
  // crown
  ctx.fillRect(cx - hw/2 + 4, top - 44, hw - 8, 48);
  // band
  ctx.fillStyle = lighten(hatColor, 30);
  ctx.fillRect(cx - hw/2 + 4, top - 10, hw - 8, 8);
}

function drawBow(ctx, cx, cy, hw, hh, hair) {
  const top = cy - hh/2 - 10;
  const bowColor = pick(['#FF69B4','#FF1493','#FF6347','#9400D3','#1E90FF']);
  ctx.fillStyle = bowColor;
  const bx = cx + hw/2 - 15;
  const by = top - 18;
  // two triangles = bow
  ctx.beginPath();
  ctx.moveTo(bx, by);
  ctx.lineTo(bx-16, by-12);
  ctx.lineTo(bx-16, by+12);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bx, by);
  ctx.lineTo(bx+16, by-12);
  ctx.lineTo(bx+16, by+12);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = lighten(bowColor, 40);
  ctx.beginPath(); ctx.arc(bx, by, 5, 0, Math.PI*2); ctx.fill();
}

// --- Real camera ---
let usingRealCamera = false;
const video = document.getElementById('cameraVideo');
const fallbackFeed = document.getElementById('fallbackFeed');
const camBanner = document.getElementById('camBanner');

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    video.style.display = 'block';
    fallbackFeed.style.display = 'none';
    usingRealCamera = true;
    camBanner.textContent = '🟢 Camera live';
    setTimeout(() => { camBanner.style.opacity = '0'; }, 2000);
  } catch(e) {
    camBanner.textContent = '🎭 No camera – using virtual feed';
    setTimeout(() => { camBanner.style.opacity = '0'; }, 3000);
  }
}

startCamera();

function takeSelfie() {
  const flash = document.getElementById('flashOverlay');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');

  setTimeout(() => {
    const canvas = document.getElementById('selfieCanvas');
    const ctx = canvas.getContext('2d');

    // If real camera is on, draw mirrored video frame as background first
    if (usingRealCamera && video.readyState >= 2) {
      ctx.save();
      ctx.translate(220, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, 220, 220);
      ctx.restore();
      // Draw cartoon selfie on top with partial transparency
      drawCartoonSelfieOverlay(ctx, 220, 220);
    } else {
      drawCartoonSelfie(ctx, 220, 220);
    }

    const caption = captions[snapCount % captions.length];
    document.getElementById('photoCaption').textContent = caption;
    document.getElementById('photoPopup').classList.add('show');

    snapCount++;
    document.getElementById('counter').textContent = `${snapCount} snap${snapCount!==1?'s':''}`;

    const strip = document.getElementById('galleryStrip');
    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    const tc = document.createElement('canvas');
    tc.width = 44; tc.height = 44;
    const tctx = tc.getContext('2d');
    tctx.drawImage(canvas, 0, 0, 44, 44);
    thumb.appendChild(tc);
    thumb.onclick = () => {
      const selfieCtx = canvas.getContext('2d');
      selfieCtx.drawImage(tc, 0, 0, 220, 220);
      document.getElementById('photoPopup').classList.add('show');
    };
    strip.insertBefore(thumb, strip.firstChild);
    if(strip.children.length > 5) strip.removeChild(strip.lastChild);
  }, 120);
}

// Overlay version: draws cartoon on top of real photo (accessories + effects only)
function drawCartoonSelfieOverlay(ctx, w, h) {
  // Colorful geometric border
  const colors = ['#FF6B6B','#FFD93D','#4ECDC4','#A8E6CF','#F093FB'];
  const bw = 10;
  for(let i=0;i<4;i++) {
    ctx.strokeStyle = colors[i % colors.length];
    ctx.lineWidth = bw;
    ctx.strokeRect(i*(bw/2), i*(bw/2), w - i*bw, h - i*bw);
  }

  // Random sticker overlays
  const stickers = ['⭐','🌟','💥','✨','🎉','🦄','👾','🔥','💖','😎','🌈'];
  ctx.font = '28px serif';
  ctx.globalAlpha = 0.9;
  const count = 3 + rndInt(0,3);
  for(let i=0;i<count;i++) {
    const sx = rnd(5, w-35), sy = rnd(5, h-35);
    ctx.fillText(pick(stickers), sx, sy+26);
  }
  ctx.globalAlpha = 1;

  // Fun caption bubble
  const bubbleText = pick(['SNAP!', 'YAS!', 'ICONIC', 'SLAY', 'OMG!', 'WOW!']);
  ctx.save();
  ctx.font = 'bold 18px Boogaloo, cursive';
  const tw = ctx.measureText(bubbleText).width;
  const bx = rnd(10, w - tw - 24), by = rnd(h*0.55, h - 40);
  ctx.fillStyle = pick(['#FFD93D','#FF6B6B','#4ECDC4','#F093FB']);
  ctx.beginPath();
  ctx.roundRect(bx - 8, by - 22, tw + 16, 30, 8);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.fillText(bubbleText, bx, by);
  ctx.restore();
}

function closePhoto() {
  document.getElementById('photoPopup').classList.remove('show');
}
